<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AI 学习助手</title>
<style>
:root{--bg:#f8f9fa;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--blue:#4a90d9;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
/* ── 模态弹窗 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;padding:28px 20px 20px;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:22px;text-align:center;margin-bottom:20px}
.mode-card{display:block;width:100%;padding:16px;margin:10px 0;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;text-align:left;cursor:pointer;transition:all .15s}
.mode-card:hover,.mode-card:active{border-color:var(--blue);background:#f0f6ff}
.mode-card .icon{font-size:24px;margin-right:8px;vertical-align:middle}
.mode-card .title{font-size:16px;font-weight:700;display:inline;vertical-align:middle}
.mode-card .desc{font-size:13px;color:var(--sub);margin-top:6px}
.mode-card .meta{font-size:12px;color:var(--blue);margin-top:4px}
/* ── 积分条 ── */
.points-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 16px;background:linear-gradient(135deg,#1a1a2e,#2d3a5c);color:#fff;font-size:14px}
.points-bar .pt{text-align:center}
.points-bar .pt .val{font-size:20px;font-weight:800}
.points-bar .pt .lbl{font-size:10px;opacity:.7}
.points-bar .divider{width:1px;height:28px;background:rgba(255,255,255,.3)}
.streak-fire{animation:pulse .6s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}
/* ── Tabs ── */
.tabs{display:flex;background:#fff;border-bottom:1px solid #eee}
.tab{flex:1;text-align:center;padding:14px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{border-bottom-color:var(--blue);color:var(--blue)}
/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:16px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
header .back{font-size:20px;cursor:pointer;padding:4px}
header .title{font-weight:700;font-size:16px}
header .badge{font-size:12px;background:var(--blue);color:#fff;padding:4px 10px;border-radius:20px}
/* ── 闪卡 ── */
.flashcard-wrap{flex:1;display:flex;flex-direction:column;padding:16px;min-height:55vh}
.flashcard{background:var(--card);border-radius:var(--radius);padding:24px 20px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.08);min-height:180px;line-height:1.9;font-size:15px;transition:transform .3s,opacity .3s;white-space:pre-wrap;word-break:break-word;position:relative}
.flashcard.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.flashcard .blank{display:inline-block;border-bottom:2.5px solid var(--blue);color:transparent;margin:0 3px;vertical-align:bottom;transition:all .2s;min-width:0}
.flashcard .blank.filled{color:var(--blue);font-weight:700;border-bottom-color:var(--green);background:#eafaf1;border-radius:2px;padding:0 2px}
.flashcard .blank.active{background:#e8f0fe;border-radius:4px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.flashcard .fc-meta{font-size:12px;color:var(--sub);margin-top:12px;padding-top:8px;border-top:1px solid #eee;display:flex;justify-content:space-between}
/* ── 选项池 ── */
.option-pool{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;justify-content:center}
.opt-btn{padding:10px 18px;border:1.5px solid #d0d5dd;border-radius:20px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.opt-btn:active{transform:scale(.95)}
.opt-btn.removed{opacity:0;transform:scale(.8);pointer-events:none;transition:all .3s}
/* ── 反馈弹窗 ── */
.feedback-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border-radius:20px;padding:24px 32px;text-align:center;z-index:200;box-shadow:0 8px 40px rgba(0,0,0,.15);transition:transform .25s cubic-bezier(.175,.885,.32,1.275);pointer-events:none}
.feedback-toast.show{transform:translate(-50%,-50%) scale(1)}
.feedback-toast .emoji{font-size:48px;display:block;margin-bottom:6px}
.feedback-toast .msg{font-size:20px;font-weight:800}
.feedback-toast .detail{font-size:13px;color:var(--sub);margin-top:4px}
.feedback-toast.correct{border:3px solid var(--green)}
/* ── 连击弹出 ── */
.streak-pop{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:28px;font-weight:900;z-index:150;pointer-events:none;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);animation:streakBoom .8s forwards}
@keyframes streakBoom{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
/* ── 完成页 ── */
.flashcard-done{text-align:center;padding:48px 24px}
.flashcard-done h2{font-size:28px;margin-bottom:12px}
.flashcard-done p{color:var(--sub);margin-bottom:16px}
/* ── 背面展示 ── */
.card-back{background:var(--card);border-radius:var(--radius);padding:24px 20px;box-shadow:0 4px 20px rgba(0,0,0,.08);line-height:1.9;font-size:15px;white-space:pre-wrap;word-break:break-word}
.card-back .term{color:var(--green);font-weight:800}
.review-actions{display:flex;gap:12px;padding:16px 0}
.review-actions button{flex:1;padding:16px;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer}
.btn-mastered{background:#eafaf1;color:var(--green);border:2px solid #a3d9b1}
.btn-skip{background:#fdedec;color:var(--red);border:2px solid #f5b7b1}
/* ── 奖品 ── */
.prize-section{padding:16px}
.prize-banner{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px}
.prize-banner .next-icon{font-size:48px;display:block;margin-bottom:8px}
.prize-banner .next-msg{font-size:16px;font-weight:700;margin-bottom:4px}
.prize-banner .next-dist{font-size:13px;opacity:.8}
.prize-card{background:#fff;border-radius:var(--radius);padding:20px;margin:12px 0;display:flex;align-items:center;gap:16px;border:1.5px solid #e5e7eb}
.prize-card .p-icon{font-size:40px}
.prize-card .p-info{flex:1}
.prize-card .p-name{font-size:16px;font-weight:700}
.prize-card .p-cost{font-size:13px;color:var(--sub)}
.prize-card .p-status{font-weight:700;font-size:14px}
.prize-card .p-status.owned{color:var(--green)}
.prize-card .p-status.locked{color:var(--sub)}
/* ── 首次奖品弹窗 ── */
.first-prize-modal .dist{font-size:48px;font-weight:900;color:var(--blue);display:block}
.first-prize-modal .goal{font-size:16px;color:var(--sub);margin:8px 0}
/* ── 通用 ── */
.hidden{display:none!important}
.section{display:none}
.section.active{display:block}
.empty-state{text-align:center;padding:60px 24px;color:var(--sub)}
.btn{padding:14px 28px;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--blue);color:#fff;width:100%}
.btn-primary:active{background:#357abd}
</style>
</head>
<body>

<!-- ═══ 奖品首次弹窗 ═══ -->
<div class="modal-overlay hidden" id="prizeFirstOverlay">
<div class="modal first-prize-modal">
<h2>🎁 积分兑好礼</h2>
<span class="dist" id="pfDistance">0</span>
<span class="goal">距离 <b id="pfNextName">一条裤子 👖</b> 还差 <b id="pfNeed">300</b> 积分</span>
<button class="btn btn-primary" onclick="startEarning()" style="margin-top:16px">💪 开始赚积分！</button>
</div>
</div>

<!-- ═══ 入口弹窗 ═══ -->
<div class="modal-overlay" id="entryOverlay">
<div class="modal" id="entryModal">
<h2>🎯 今天学什么？</h2>
<div id="modeCards"></div>
</div>
</div>

<!-- ═══ 主界面 ═══ -->
<div id="mainApp" class="hidden">
  <div class="points-bar" id="pointsBar">
    <div class="pt"><div class="val" id="ptTotal">0</div><div class="lbl">总积分</div></div>
    <div class="divider"></div>
    <div class="pt"><div class="val" id="ptStreak">0</div><div class="lbl">🔥 连击</div></div>
    <div class="divider"></div>
    <div class="pt"><div class="val" id="ptMulti">×1.0</div><div class="lbl">倍率</div></div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="flashcard">📇 闪卡</div>
    <div class="tab" data-tab="prizes">🏆 奖品</div>
  </div>

  <!-- 闪卡区 -->
  <div class="section active" id="flashcardSection">
    <header><span class="back" onclick="goBack()">←</span><span class="title" id="fcTitle">闪卡复习</span><span class="badge" id="fcBadge"></span></header>
    <div class="flashcard-wrap" id="flashcardWrap"></div>
  </div>

  <!-- 奖品区 -->
  <div class="section" id="prizesSection">
    <header><span class="title">🏆 奖品库</span></header>
    <div class="prize-section" id="prizesContent"></div>
  </div>
</div>

<!-- ═══ 反馈弹窗 ═══ -->
<div class="feedback-toast correct" id="feedbackToast"><span class="emoji" id="fbEmoji">🎉</span><span class="msg" id="fbMsg"></span><span class="detail" id="fbDetail"></span></div>

<script>
const API = "https://ai-study-assistant-production-c47f.up.railway.app";

let currentMode = null;
let knowledgePoints = [];
let flashcards = [];
let fcIndex = 0;
let pointsState = { total_points:0, current_streak:0, max_streak:0, multiplier:1.0 };

// ─── 当前闪卡状态 ───
let currentCard = null;         // parsed card {front, back, blanks[]}
let currentBlanks = [];         // [{pos, answer, userAnswer:null}]
let activeBlankIdx = 0;
let optionPool = [];            // [{text, removed:bool}]
let hasShownFirstPrize = localStorage.getItem("v2_first_prize_shown");

// ═══ 入口 ═══
async function init() {
  await loadPoints();
  // 首次打开 → 奖品弹窗
  if (!hasShownFirstPrize) {
    document.getElementById("prizeFirstOverlay").classList.remove("hidden");
  } else {
    document.getElementById("entryOverlay").style.display = "flex";
  }
  await loadModes();
}
function startEarning() {
  localStorage.setItem("v2_first_prize_shown", "1");
  document.getElementById("prizeFirstOverlay").classList.add("hidden");
  document.getElementById("entryOverlay").style.display = "flex";
}
async function loadModes() {
  const container = document.getElementById("modeCards");
  container.innerHTML = '<p style="text-align:center;color:#999;padding:20px">加载中...</p>';
  try {
    const res = await fetch(API + "/modes");
    const data = await res.json();
    let html = "";
    ["today","chapter","weekly"].forEach(key => {
      const m = data[key] || {};
      const icons = {today:"📅",chapter:"📑",weekly:"📆"};
      html += `<button class="mode-card" onclick="startReview('${key}','${(m.knowledge_points||[]).join(",")}','${m.label||key}')">
        <span class="icon">${icons[key]}</span><span class="title">${m.label||key}</span>
        <div class="desc">${m.desc||""}</div>
        <div class="meta">${m.card_count||0} 张卡片</div>
      </button>`;
    });
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<p style="text-align:center;color:#e74c3c;padding:20px">连接后端失败<br><small>${e.message}</small></p>`;
  }
}
function startReview(mode, kps, label) {
  currentMode = {mode, kps, label};
  knowledgePoints = kps.split(",").filter(Boolean);
  document.getElementById("entryOverlay").style.display = "none";
  document.getElementById("mainApp").classList.remove("hidden");
  document.getElementById("fcTitle").textContent = label;
  switchTab("flashcard");
  loadFlashcards();
  updatePointsBar();
}
function goBack() {
  document.getElementById("mainApp").classList.add("hidden");
  document.getElementById("entryOverlay").style.display = "flex";
  loadModes();
}

// ═══ 积分 ═══
async function loadPoints() {
  try { const r = await fetch(API + "/points"); if (r.ok) pointsState = await r.json(); } catch(e){}
  updatePointsBar();
  updatePrizeDistance();
}
function updatePointsBar() {
  document.getElementById("ptTotal").textContent = pointsState.total_points||0;
  document.getElementById("ptStreak").textContent = pointsState.current_streak||0;
  document.getElementById("ptMulti").textContent = "×"+(pointsState.multiplier||1).toFixed(1);
  const el = document.getElementById("ptStreak");
  el.classList.toggle("streak-fire", (pointsState.current_streak||0) >= 5);
}
async function awardPoints() {
  try {
    const r = await fetch(API + "/points/award", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({reason:"flashcard_mastered"})});
    if (r.ok) { pointsState = await r.json(); updatePointsBar(); updatePrizeDistance(); }
  } catch(e){}
  // 连击提示
  const s = pointsState.current_streak || 0;
  if (s > 0 && s % 3 === 0) {
    let word = s >= 10 ? "Amazing! 🔥" : s >= 5 ? "Great! ⚡" : "Nice! 👏";
    showStreakPop(word + " ×" + (pointsState.multiplier||1).toFixed(1));
  }
}
async function resetPoints() {
  try {
    const r = await fetch(API + "/points/reset", {method:"POST"});
    if (r.ok) { pointsState = await r.json(); updatePointsBar(); }
  } catch(e){}
}
function showStreakPop(msg) {
  const p = document.createElement("div"); p.className = "streak-pop"; p.textContent = msg;
  document.body.appendChild(p); setTimeout(() => p.remove(), 800);
}
function showFeedback(msg, detail) {
  const t = document.getElementById("feedbackToast");
  document.getElementById("fbMsg").textContent = msg;
  document.getElementById("fbDetail").textContent = detail||"";
  t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 700);
}
function updatePrizeDistance() {
  const pts = pointsState.total_points || 0;
  const el = document.getElementById("pfDistance");
  if (!el) return;
  if (pts < 300) {
    el.textContent = "300分";
    document.getElementById("pfNextName").textContent = "一条裤子 👖";
    document.getElementById("pfNeed").textContent = 300 - pts;
  } else if (pts < 500) {
    el.textContent = "500分";
    document.getElementById("pfNextName").textContent = "一场话剧 🎭";
    document.getElementById("pfNeed").textContent = 500 - pts;
  } else {
    el.textContent = "已解锁全部！";
    document.getElementById("pfNextName").textContent = "";
    document.getElementById("pfNeed").textContent = "";
  }
}

// ═══ 闪卡 ═══
async function loadFlashcards() {
  const wrap = document.getElementById("flashcardWrap");
  wrap.innerHTML = '<p class="empty-state">加载中...</p>';
  try {
    const res = await fetch(API + "/flashcards?kps=" + encodeURIComponent(knowledgePoints.join(",")));
    flashcards = await res.json();
    if (!flashcards.length) { wrap.innerHTML = '<div class="flashcard-done"><h2>🎉</h2><p>暂无数据</p></div>'; return; }
    fcIndex = 0;
    renderCard();
  } catch(e) { wrap.innerHTML = '<p class="empty-state">加载失败: '+e.message+'</p>'; }
}

function renderCard() {
  if (fcIndex >= flashcards.length) {
    document.getElementById("flashcardWrap").innerHTML = `<div class="flashcard-done">
      <h2>🎉</h2><p>全部复习完成！</p><button class="btn btn-primary" onclick="goBack()">返回</button></div>`;
    document.getElementById("fcBadge").textContent = `${flashcards.length}/${flashcards.length}`;
    return;
  }
  document.getElementById("fcBadge").textContent = `${fcIndex+1}/${flashcards.length}`;
  const card = flashcards[fcIndex];
  let data;
  try { data = typeof card.content === "string" ? JSON.parse(card.content) : card.content; }
  catch(e) { data = { front: card.content, back: card.content, blanks: [] }; }
  currentCard = data;
  currentBlanks = (data.blanks||[]).map(b => ({...b, userAnswer: null}));
  activeBlankIdx = 0;

  // Build option pool: collect all answers + distractors, shuffle
  let seen = new Set();
  optionPool = [];
  (data.blanks||[]).forEach(b => {
    (b.options||[]).forEach(o => {
      if (!seen.has(o)) { seen.add(o); optionPool.push({text: o, removed: false}); }
    });
  });
  shuffle(optionPool);

  renderFront();
  renderOptions();
}

function renderFront() {
  let html = escapeHtml(currentCard.front||"");
  // Replace ___ with styled blanks — use the answer length for underline width
  currentBlanks.forEach((b, i) => {
    let cls = "blank";
    if (b.userAnswer !== null) cls += " filled";
    if (i === activeBlankIdx && b.userAnswer === null) cls += " active";
    let display = b.userAnswer !== null ? b.userAnswer : "_".repeat(b.answer.length);
    html = html.replace("_".repeat(b.answer.length), `<span class="${cls}" onclick="focusBlank(${i})">${display}</span>`);
  });
  document.getElementById("flashcardWrap").innerHTML = `
    <div class="flashcard" id="cardEl">
      ${html}
      <div class="fc-meta">
        <span>📂 ${escapeHtml(cardPhase())}</span>
        <span id="blankHint">${currentBlanks.filter(b=>b.userAnswer===null).length} 空待填</span>
      </div>
    </div>
    <div class="option-pool" id="optionPool"></div>`;
}

function focusBlank(i) {
  if (currentBlanks[i].userAnswer !== null) return; // already filled
  activeBlankIdx = i;
  renderFront();
  renderOptions();
}

function renderOptions() {
  const pool = document.getElementById("optionPool");
  if (!pool) return;
  let html = "";
  optionPool.forEach((o, i) => {
    if (o.removed) html += `<span class="opt-btn removed">${escapeHtml(o.text)}</span>`;
    else html += `<button class="opt-btn" onclick="pickOption(${i})">${escapeHtml(o.text)}</button>`;
  });
  pool.innerHTML = html;
}

function pickOption(idx) {
  const opt = optionPool[idx];
  if (opt.removed) return;

  const blank = currentBlanks[activeBlankIdx];
  if (!blank || blank.userAnswer !== null) return;

  if (opt.text === blank.answer) {
    // Correct!
    blank.userAnswer = opt.text;
    opt.removed = true;
    showFeedback("+1", blank.answer);
    awardPoints();
    renderFront();
    renderOptions();

    // Find next unfilled blank
    const next = currentBlanks.findIndex((b, i) => i > activeBlankIdx && b.userAnswer === null);
    if (next >= 0) {
      activeBlankIdx = next;
      setTimeout(() => { renderFront(); renderOptions(); }, 300);
    } else {
      // Check if all blanks filled
      const unfilled = currentBlanks.filter(b => b.userAnswer === null).length;
      if (unfilled === 0) {
        setTimeout(showCardBack, 500);
      } else {
        // Find first unfilled
        activeBlankIdx = currentBlanks.findIndex(b => b.userAnswer === null);
        setTimeout(() => { renderFront(); renderOptions(); }, 300);
      }
    }
  } else {
    // Wrong — shake
    const el = document.getElementById("cardEl");
    if (el) { el.classList.add("shake"); setTimeout(() => el.classList.remove("shake"), 400); }
    resetPoints();
    showFeedback("再试一次", "正确答案不是 " + opt.text);
  }
}

function showCardBack() {
  let backHtml = escapeHtml(currentCard.back||"");
  // Highlight the terms in green
  currentBlanks.forEach(b => {
    backHtml = backHtml.replace("**"+b.answer+"**", `<span class="term">⭐ ${b.answer}</span>`);
  });
  document.getElementById("flashcardWrap").innerHTML = `
    <div class="card-back">${backHtml}</div>
    <div class="review-actions">
      <button class="btn-skip" onclick="reviewCard('not_mastered')">👎 没掌握</button>
      <button class="btn-mastered" onclick="reviewCard('mastered')">👍 掌握了</button>
    </div>`;
}

function reviewCard(action) {
  if (fcIndex >= flashcards.length) return;
  const card = flashcards[fcIndex];
  fetch(API + "/review", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({flashcard_id:card.id, knowledge_point:card.title, action})
  }).catch(()=>{});
  fcIndex++;
  renderCard();
}

function cardPhase() {
  const card = flashcards[fcIndex];
  return (card?.phase||"") + " · " + (card?.chapter||"");
}

// ═══ 奖品 ─═��
async function loadPrizes() {
  const c = document.getElementById("prizesContent");
  try {
    const [libR, mineR] = await Promise.all([fetch(API+"/prizes"), fetch(API+"/prizes/mine")]);
    const lib = await libR.json(); const mine = await mineR.json();
    const ownedIds = new Set((mine||[]).map(p=>p.prize_id));
    const pts = pointsState.total_points||0;
    // Next prize distance
    let nextPrize = null, dist = Infinity;
    (lib||[]).forEach(p => { if (!ownedIds.has(p.id) && p.cost > pts && p.cost < dist) { dist = p.cost; nextPrize = p; } });
    let html = "";
    if (nextPrize) {
      html += `<div class="prize-banner"><span class="next-icon">${nextPrize.icon||'🎁'}</span>
        <div class="next-msg">下一个礼物：${nextPrize.name}</div>
        <div class="next-dist">还差 <b>${nextPrize.cost - pts}</b> 积分（当前 ${pts} / ${nextPrize.cost}）</div></div>`;
    }
    (lib||[]).forEach(p => {
      const owned = ownedIds.has(p.id);
      html += `<div class="prize-card">
        <span class="p-icon">${p.icon||'🏆'}</span>
        <div class="p-info"><div class="p-name">${p.name}</div><div class="p-cost">${p.description||(p.cost+' 积分')}</div></div>
        <span class="p-status${owned?' owned':' locked'}">${owned?'✅ 已获得':'🔒'}</span>
      </div>`;
    });
    c.innerHTML = html;
  } catch(e) { c.innerHTML = '<p class="empty-state">加载失败</p>'; }
}
async function redeemPrize(id) {
  try {
    const r = await fetch(API+"/prizes/redeem", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prize_id:id})});
    if (r.ok) { await loadPoints(); await loadPrizes(); } else { const e = await r.json(); alert(e.detail||"兑换失败"); }
  } catch(e) { alert("兑换失败"); }
}

// ═══ Tab ═══
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(name+"Section").classList.add("active");
  if (name==="prizes") loadPrizes();
  if (name==="flashcard") renderFront();
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));

// ═══ 工具 ═══
function escapeHtml(s) { if(!s)return""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ═══ 启动 ═══
init();
</script>
